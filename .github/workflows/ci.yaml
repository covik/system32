name: 'CI'

on:
  pull_request:
    paths-ignore:
      - renovate.json
  push:
    paths-ignore:
      - renovate.json
    branches:
      - main

jobs:
  lint:
    name: 'Lint'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: devcontainers/ci@v0.3
        with:
          runCmd: pnpm format:check && pnpm lint

  preview:
    name: 'Preview'
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: devcontainers/ci@v0.3
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        with:
          runCmd: pnpm build && pulumi preview --stack cromanjonac --suppress-progress --non-interactive

  deploy:
    name: 'Deploy'
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency: 'deploy'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Pulumi refresh production
        uses: devcontainers/ci@v0.3
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        with:
          runCmd: |
            set -euo pipefail
            pnpm build
            pulumi refresh --stack cromanjonac \
              --run-program=true --skip-preview \
              --suppress-progress --non-interactive \
              2>&1 | tee refresh.log

            {
              echo "## Pulumi refresh result"
              echo ""
              echo "<details><summary>Show refresh summary</summary>"
              echo ""
              echo '```'
              cat refresh.log
              echo '```'
              echo "</details>"
            } >> "$GITHUB_STEP_SUMMARY"

      - name: Pulumi Up (Deploy to Production)
        uses: devcontainers/ci@v0.3
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        with:
          runCmd: pnpm build && pulumi up --stack cromanjonac --skip-preview --suppress-progress --non-interactive

      - name: Cancel update on failure
        if: failure() || cancelled()
        uses: devcontainers/ci@v0.3
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        with:
          runCmd: pulumi cancel --yes --stack cromanjonac
