name: "CI"

on:
  pull_request:
    paths-ignore:
      - renovate.json
  push:
    paths-ignore:
      - renovate.json
    branches:
      - main

jobs:
  lint:
    name: "Lint"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: devcontainers/ci@v0.3
        with:
          runCmd: pnpm check >> "$GITHUB_STEP_SUMMARY" 2>&1

  preview:
    name: "Preview"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: devcontainers/ci@v0.3
        with:
          env: |
            PULUMI_ACCESS_TOKEN=${{ secrets.PULUMI_ACCESS_TOKEN }}
            PULUMI_CI=true
            CI=true
            GITHUB_ACTIONS=true
            GITHUB_REPOSITORY=${{ github.repository }}
            GITHUB_REF=${{ github.ref }}
            GITHUB_REF_NAME=${{ github.ref_name }}
            GITHUB_SHA=${{ github.sha }}
            GITHUB_RUN_ID=${{ github.run_id }}
            GITHUB_RUN_NUMBER=${{ github.run_number }}
            GITHUB_WORKFLOW=${{ github.workflow }}
            GITHUB_ACTOR=${{ github.actor }}
          runCmd: pnpm production:preview

  refresh:
    name: "Refresh"
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency: "deploy"
    needs:
      - lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Refresh production
        uses: devcontainers/ci@v0.3
        with:
          env: |
            PULUMI_ACCESS_TOKEN=${{ secrets.PULUMI_ACCESS_TOKEN }}
            PULUMI_CI=true
            CI=true
            GITHUB_ACTIONS=true
            GITHUB_REPOSITORY=${{ github.repository }}
            GITHUB_REF=${{ github.ref }}
            GITHUB_REF_NAME=${{ github.ref_name }}
            GITHUB_SHA=${{ github.sha }}
            GITHUB_RUN_ID=${{ github.run_id }}
            GITHUB_RUN_NUMBER=${{ github.run_number }}
            GITHUB_WORKFLOW=${{ github.workflow }}
            GITHUB_ACTOR=${{ github.actor }}
          runCmd: pnpm production:refresh >> "$GITHUB_STEP_SUMMARY" 2>&1

  deploy:
    name: "Deploy"
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency: "deploy"
    needs:
      - refresh
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Deploy production
        uses: devcontainers/ci@v0.3
        with:
          env: |
            PULUMI_ACCESS_TOKEN=${{ secrets.PULUMI_ACCESS_TOKEN }}
            PULUMI_CI=true
            CI=true
            GITHUB_ACTIONS=true
            GITHUB_REPOSITORY=${{ github.repository }}
            GITHUB_REF=${{ github.ref }}
            GITHUB_REF_NAME=${{ github.ref_name }}
            GITHUB_SHA=${{ github.sha }}
            GITHUB_RUN_ID=${{ github.run_id }}
            GITHUB_RUN_NUMBER=${{ github.run_number }}
            GITHUB_WORKFLOW=${{ github.workflow }}
            GITHUB_ACTOR=${{ github.actor }}
          runCmd: pnpm production:deploy >> "$GITHUB_STEP_SUMMARY" 2>&1

      - name: Cancel update on failure
        if: failure() || cancelled()
        uses: devcontainers/ci@v0.3
        with:
          env: |
            PULUMI_ACCESS_TOKEN=${{ secrets.PULUMI_ACCESS_TOKEN }}
            PULUMI_CI=true
            CI=true
            GITHUB_ACTIONS=true
            GITHUB_REPOSITORY=${{ github.repository }}
            GITHUB_REF=${{ github.ref }}
            GITHUB_REF_NAME=${{ github.ref_name }}
            GITHUB_SHA=${{ github.sha }}
            GITHUB_RUN_ID=${{ github.run_id }}
            GITHUB_RUN_NUMBER=${{ github.run_number }}
            GITHUB_WORKFLOW=${{ github.workflow }}
            GITHUB_ACTOR=${{ github.actor }}
          runCmd: pnpm production:cancel
