name: "CI"

on:
  pull_request:
    paths-ignore:
      - renovate.json
  push:
    paths-ignore:
      - renovate.json
    branches:
      - main

jobs:
  lint:
    name: "Lint"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: devcontainers/ci@v0.3
        with:
          runCmd: pnpm format:check && pnpm lint

  preview:
    name: "Preview"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: devcontainers/ci@v0.3
        with:
          env: |
            PULUMI_ACCESS_TOKEN=${{ secrets.PULUMI_ACCESS_TOKEN }}
            PULUMI_CI=true
            CI=true
            GITHUB_ACTIONS=true
            GITHUB_REPOSITORY=${{ github.repository }}
            GITHUB_REF=${{ github.ref }}
            GITHUB_REF_NAME=${{ github.ref_name }}
            GITHUB_SHA=${{ github.sha }}
            GITHUB_RUN_ID=${{ github.run_id }}
            GITHUB_RUN_NUMBER=${{ github.run_number }}
            GITHUB_WORKFLOW=${{ github.workflow }}
            GITHUB_ACTOR=${{ github.actor }}
          runCmd: pnpm production:preview --filter @project/cromanjonac

  deploy:
    name: "Deploy"
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency: "deploy"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Pulumi refresh production
        uses: devcontainers/ci@v0.3
        with:
          env: |
            PULUMI_ACCESS_TOKEN=${{ secrets.PULUMI_ACCESS_TOKEN }}
            PULUMI_CI=true
            CI=true
            GITHUB_ACTIONS=true
            GITHUB_REPOSITORY=${{ github.repository }}
            GITHUB_REF=${{ github.ref }}
            GITHUB_REF_NAME=${{ github.ref_name }}
            GITHUB_SHA=${{ github.sha }}
            GITHUB_RUN_ID=${{ github.run_id }}
            GITHUB_RUN_NUMBER=${{ github.run_number }}
            GITHUB_WORKFLOW=${{ github.workflow }}
            GITHUB_ACTOR=${{ github.actor }}
          runCmd: |
            set -euo pipefail
            pnpm production:refresh --filter @project/cromanjonac \
              2>&1 | tee refresh.log

            {
              echo "## Pulumi refresh result"
              echo ""
              echo "<details><summary>Show refresh summary</summary>"
              echo ""
              echo '```'
              cat refresh.log
              echo '```'
              echo "</details>"
            } >> "$GITHUB_STEP_SUMMARY"

      - name: Pulumi Up (Deploy to Production)
        uses: devcontainers/ci@v0.3
        with:
          env: |
            PULUMI_ACCESS_TOKEN=${{ secrets.PULUMI_ACCESS_TOKEN }}
            PULUMI_CI=true
            CI=true
            GITHUB_ACTIONS=true
            GITHUB_REPOSITORY=${{ github.repository }}
            GITHUB_REF=${{ github.ref }}
            GITHUB_REF_NAME=${{ github.ref_name }}
            GITHUB_SHA=${{ github.sha }}
            GITHUB_RUN_ID=${{ github.run_id }}
            GITHUB_RUN_NUMBER=${{ github.run_number }}
            GITHUB_WORKFLOW=${{ github.workflow }}
            GITHUB_ACTOR=${{ github.actor }}
          runCmd: pnpm production:deploy --filter @project/cromanjonac

      - name: Cancel update on failure
        if: failure() || cancelled()
        uses: devcontainers/ci@v0.3
        with:
          env: |
            PULUMI_ACCESS_TOKEN=${{ secrets.PULUMI_ACCESS_TOKEN }}
            PULUMI_CI=true
            CI=true
            GITHUB_ACTIONS=true
            GITHUB_REPOSITORY=${{ github.repository }}
            GITHUB_REF=${{ github.ref }}
            GITHUB_REF_NAME=${{ github.ref_name }}
            GITHUB_SHA=${{ github.sha }}
            GITHUB_RUN_ID=${{ github.run_id }}
            GITHUB_RUN_NUMBER=${{ github.run_number }}
            GITHUB_WORKFLOW=${{ github.workflow }}
            GITHUB_ACTOR=${{ github.actor }}
          runCmd: pulumi cancel --yes --cwd projects/cromanjonac --stack production
